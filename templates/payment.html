<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream - Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap');
        body {
            background-color: #0d0221;
            color: white;
            font-family: 'Outfit', sans-serif;
            padding: 80px 0;
        }
        .payment-card {
            background: #1a0b3b;
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(157, 80, 187, 0.1);
            max-width: 600px;
            margin: auto;
        }
        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 10px;
            padding: 12px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.1);
            color: white;
            border-color: #9d50bb;
            box-shadow: 0 0 10px rgba(157, 80, 187, 0.2);
        }
        .btn-pay {
            background: linear-gradient(45deg, #9d50bb, #ff00cc);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            font-size: 1.1rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="payment-card">
            <h2 class="fw-bold mb-4">Secure Checkout</h2>
            <div class="mb-4 p-3 bg-dark rounded border border-secondary">
                <div class="d-flex justify-content-between mb-2">
                    <span>Order Total:</span>
                    <span class="fw-bold" style="color: #ff00cc;">₹{{ total }}</span>
                </div>
                <div class="small text-muted">{{ cart_items|length }} Movies in cart</div>
            </div>

            <form action="/checkout" method="POST">
                <div class="mb-3">
                    <label class="form-label small text-muted">CARDHOLDER NAME</label>
                    <input type="text" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-muted">CARD NUMBER</label>
                    <input type="text" class="form-control" placeholder="**** **** **** 1234" required>
                </div>
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label small text-muted">EXPIRY DATE</label>
                        <input type="text" class="form-control" placeholder="MM/YY" required>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label small text-muted">CVV</label>
                        <input type="password" class="form-control" placeholder="***" required>
                    </div>
                </div>
                
                <div class="small text-muted mb-4 mt-2">
                    <i class="fas fa-lock me-2 text-success"></i> Your payment information is encrypted and secure.
                </div>

                <button type="submit" class="btn-pay">Pay & Complete Rental</button>
            </form>
            
            <div class="text-center mt-4">
                <a href="/cart" class="text-white-50 text-decoration-none small">Cancel and return to cart</a>
            </div>
        </div>
    </div>
</body>
</html>
