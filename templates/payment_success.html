<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream - Success!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap');
        body {
            background-color: #0d0221;
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .success-card {
            background: #1a0b3b;
            border-radius: 30px;
            padding: 60px;
            max-width: 500px;
            border: 1px solid rgba(157, 80, 187, 0.2);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .check-icon {
            font-size: 5rem;
            color: #ff00cc;
            margin-bottom: 30px;
        }
        .btn-home {
            background: linear-gradient(45deg, #9d50bb, #ff00cc);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="success-card">
        <i class="fas fa-check-circle check-icon"></i>
        <h1 class="fw-bold mb-3">Rental Confirmed!</h1>
        <p class="text-muted">Your payment was successful. The movies have been added to your library and are ready to stream.</p>
        <div class="mt-4">
            <a href="/dashboard" class="btn-home">Go to My Library</a>
        </div>
    </div>
</body>
</html>
