<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream - My Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap');
        body {
            background-color: #0b0f19;
            color: white;
            font-family: 'Outfit', sans-serif;
            padding-top: 100px;
        }
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px 4%;
        }
        .rental-card {
            background: #161d2f;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s;
        }
        .rental-card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
        }
        .rental-img {
            height: 180px;
            width: 100%;
            object-fit: cover;
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }
        .rental-info { padding: 20px; }
        .tag-duration {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <nav class="navbar fixed-top px-4 py-3" style="background: rgba(11,15,25,0.9); backdrop-filter: blur(10px);">
        <a href="/movies" class="h3 fw-bold text-info text-decoration-none">CineStream</a>
        <a href="/movies" class="btn btn-outline-info rounded-pill px-4">Browse More</a>
    </nav>

    <div class="container-fluid px-5">
        <h2 class="fw-bold mb-4">My Library</h2>
        
        {% if rentals %}
        <div class="library-grid">
            {% for r in rentals %}
            <div class="rental-card">
                <img src="{{ r.movie.image_url }}" class="rental-img" alt="">
                <div class="rental-info">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="tag-duration">{{ r.duration }}</span>
                        <span class="small text-muted">₹{{ r.cost }}</span>
                    </div>
                    <h5 class="fw-bold">{{ r.movie.title }}</h5>
                    <p class="small text-muted mb-3">{{ r.movie.genre }}</p>
                    <a href="#" class="btn btn-info w-100 rounded-pill fw-bold">Watch Now</a>
                    <div class="text-center mt-3">
                        <a href="/return/{{ r.id }}" class="text-danger small text-decoration-none">Return Early</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="text-center py-5">
            <i class="fas fa-film fa-4x mb-4 text-muted"></i>
            <h3>You haven't rented any movies yet.</h3>
            <a href="/movies" class="btn btn-info mt-4 rounded-pill px-5">Go Exploring</a>
        </div>
        {% endif %}
    </div>
</body>
</html>
